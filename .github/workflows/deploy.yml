name: Build & Deploy

on:
  push:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/roadmvn/quizforge-backend
  NGINX_IMAGE: ghcr.io/roadmvn/quizforge-nginx

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: cd frontend && npm ci && npm run build

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=preprod" >> $GITHUB_OUTPUT
          fi

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push nginx
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.NGINX_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.NGINX_IMAGE }}:${{ github.sha }}

  deploy-preprod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'develop'
    environment: preprod

    steps:
      - name: Deploy to Préprod (VPS-A)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PREPROD_HOST }}
          username: ${{ secrets.PREPROD_USER }}
          key: ${{ secrets.PREPROD_SSH_KEY }}
          script: |
            cd /opt/quizforge
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d --force-recreate
            echo "✅ Préprod déployée"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'main'
    environment: production

    steps:
      - name: Deploy to Prod (VPS-B)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/quizforge
            sudo docker compose pull
            sudo docker compose up -d --force-recreate
            echo "Prod deployee"
